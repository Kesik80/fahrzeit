<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Fahrer – Live Tracking</title>
<link rel="manifest" href="/driver-manifest.json"/>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #222222;
  --card: #2a2a2a;
  --border: #333333;
  --primary: #4285f4;
  --success: #34a853;
  --danger: #ea4335;
  --warn: #f9ab00;
  --text: #eeeeee;
  --muted: #888888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: var(--surface);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
header h1 { font-size: 1em; font-weight: 700; flex: 1; color: var(--text); }
.badge { font-size: 0.72em; padding: 4px 10px; border-radius: 20px; font-weight: 700; }
.badge-live { background: var(--success); color: #fff; }
.badge-off  { background: #2a2a4a; color: var(--muted); border: 1px solid var(--border); }

/* Setup экран */
.setup-panel {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}
.setup-panel label {
  font-size: 0.78em;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 0.8em;
  resize: none;
  height: 90px;
  line-height: 1.5;
}
textarea:focus { outline: none; border-color: var(--primary); }

/* Карта */
#map {
  width: 100%;
  flex-shrink: 0;
  display: none;
}

/* Нижняя панель */
.bottom-panel {
  background: var(--surface);
  padding: 10px 12px;
  display: none;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
.info-bar {
  display: flex;
  justify-content: space-between;
  font-size: 0.72em;
  color: var(--muted);
  padding: 2px 2px;
}
.info-bar b { color: var(--text); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #333; display: inline-block; margin-right: 4px; vertical-align: middle; }
.dot.active { background: var(--success); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Кнопки */
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-size: 0.92em;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  letter-spacing: 0.02em;
}
.btn-start { background: var(--success); }
.btn-row   { display: flex; gap: 8px; }
.btn-row .btn { padding: 11px 4px; font-size: 0.8em; flex: 1; }
.btn-nav   { background: var(--warn); color: #1a1100; }
.btn-share { background: var(--primary); }
.btn-stop  { background: var(--danger); }
</style>
</head>
<body>
<header>
  <span>🚗</span>
  <h1>Fahrer – Live Tracking</h1>
  <span class="badge badge-off" id="statusBadge">● Bereit</span>
</header>

<div class="setup-panel" id="setupPanel">
  <div>
    <label>Маршрут (ссылка из Fahrzeit Rechner)</label>
    <textarea id="routeUrl" placeholder="https://www.google.com/maps/dir/?api=1&origin=..."></textarea>
  </div>
  <button class="btn btn-start" id="btnStart">▶ Старт — начать трекинг</button>
</div>

<div id="map"></div>

<div class="bottom-panel" id="bottomPanel">
  <div class="info-bar">
    <span><span class="dot" id="dot"></span>GPS: <b id="infoCoords">—</b></span>
    <span>🔄 <b id="infoCount">0</b></span>
    <span>🕐 <b id="infoTime">—</b></span>
  </div>
  <div class="btn-row">
    <button class="btn btn-nav"   id="btnNav">🧭 Navigation</button>
    <button class="btn btn-share" id="btnShare">📋 Ссылка</button>
    <button class="btn btn-stop"  id="btnStop">■ Стоп</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getDatabase, ref, set, onDisconnect } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';

const app = initializeApp({
  apiKey: "AIzaSyDPD_dheNbYyskB9JwgnoNCBCnY-yWWOYg",
  authDomain: "fahrzeit-tracker-22f33.firebaseapp.com",
  databaseURL: "https://fahrzeit-tracker-22f33-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fahrzeit-tracker-22f33",
  storageBucket: "fahrzeit-tracker-22f33.firebasestorage.app",
  messagingSenderId: "400087462292",
  appId: "1:400087462292:web:d8ae84ab452968da161f81"
});
const db = getDatabase(app);

let sessionId=null, watchId=null, updateCount=0, map=null, driverMarker=null;
const routeInput  = document.getElementById('routeUrl');
const setupPanel  = document.getElementById('setupPanel');
const bottomPanel = document.getElementById('bottomPanel');
const mapEl       = document.getElementById('map');
const statusBadge = document.getElementById('statusBadge');

const rp = new URLSearchParams(location.search).get('route');
if (rp) routeInput.value = decodeURIComponent(rp);

function setStatus(text, live) {
  statusBadge.className = 'badge ' + (live ? 'badge-live' : 'badge-off');
  statusBadge.textContent = '● ' + text;
  document.getElementById('dot').className = 'dot' + (live ? ' active' : '');
}

function fixMapHeight() {
  const headerH = document.querySelector('header').getBoundingClientRect().height;
  const bottomH = bottomPanel.getBoundingClientRect().height;
  const mapH = Math.floor(window.innerHeight - headerH - bottomH);
  mapEl.style.height = mapH + 'px';
  if (map) google.maps.event.trigger(map, 'resize');
}

async function writeLocation(lat, lng) {
  try {
    await set(ref(db, 'sessions/' + sessionId), {
      lat, lng, ts: Date.now(), route: routeInput.value.trim(), active: true
    });
    updateCount++;
    document.getElementById('infoCoords').textContent = lat.toFixed(4) + ', ' + lng.toFixed(4);
    document.getElementById('infoTime').textContent = new Date().toLocaleTimeString('de-DE');
    document.getElementById('infoCount').textContent = updateCount;
    if (map) {
      const pos = {lat, lng};
      if (!driverMarker) {
        driverMarker = new google.maps.Marker({
          position: pos, map,
          icon: {url:'https://maps.google.com/mapfiles/ms/icons/blue-dot.png', scaledSize: new google.maps.Size(44,44)},
          title: 'Ich', zIndex: 999
        });
      } else { driverMarker.setPosition(pos); }
    }
    setStatus('LIVE', true);
  } catch(e) { setStatus('DB Fehler', false); }
}

function renderRoute(routeUrl) {
  try {
    const url = new URL(routeUrl);
    const origin = decodeURIComponent(url.searchParams.get('origin')||'');
    const destination = decodeURIComponent(url.searchParams.get('destination')||'');
    const wps = url.searchParams.get('waypoints')||'';
    const waypoints = wps ? decodeURIComponent(wps).split('|').filter(Boolean)
      .map(w => ({location:w.trim(), stopover:true})) : [];
    if (!origin||!destination) return;
    const ds = new google.maps.DirectionsService();
    const dr = new google.maps.DirectionsRenderer({
      map, suppressMarkers: false,
      polylineOptions: {strokeColor:'#4285f4', strokeWeight:5, strokeOpacity:0.85}
    });
    ds.route({origin, destination, waypoints, travelMode:'DRIVING', optimizeWaypoints:false},
      (result, status) => {
        if (status==='OK') {
          dr.setDirections(result);
          const bounds = new google.maps.LatLngBounds();
          result.routes[0].legs.forEach(l => { bounds.extend(l.start_location); bounds.extend(l.end_location); });
          map.fitBounds(bounds);
        }
      });
  } catch(e) { console.warn('Route:', e); }
}

document.getElementById('btnStart').addEventListener('click', async () => {
  const routeUrl = routeInput.value.trim();
  if (!routeUrl) { alert('Bitte Routenlink einfügen'); return; }
  if (!navigator.geolocation) { alert('Geolocation nicht verfügbar'); return; }

  sessionId = Math.random().toString(36).substr(2,6).toUpperCase();
  updateCount = 0;
  setStatus('Verbinde...', false);
  onDisconnect(ref(db,'sessions/'+sessionId)).update({active:false});

  let apiKey;
  try { apiKey = (await (await fetch('https://fahrzeit.vercel.app/api/maps-key')).json()).key; }
  catch(e) { alert('Maps API Fehler'); return; }

  await new Promise(resolve => {
    window.__driverMapCb = resolve;
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=__driverMapCb&language=de`;
    document.head.appendChild(s);
  });

  setupPanel.style.display = 'none';
  bottomPanel.style.display = 'flex';
  bottomPanel.style.flexDirection = 'column';

  await new Promise(r => requestAnimationFrame(r));

  fixMapHeight();
  mapEl.style.display = 'block';

  map = new google.maps.Map(mapEl, {
    center:{lat:51.5,lng:7.0}, zoom:12,
    zoomControl:true, streetViewControl:false, fullscreenControl:true, mapTypeControl:false
  });

  renderRoute(routeUrl);

  document.getElementById('btnNav').onclick = () => window.open(routeUrl, '_blank');

  navigator.geolocation.getCurrentPosition(
    p => writeLocation(p.coords.latitude, p.coords.longitude),
    e => setStatus('GPS: '+e.message, false),
    {enableHighAccuracy:true, timeout:15000}
  );
  watchId = navigator.geolocation.watchPosition(
    p => writeLocation(p.coords.latitude, p.coords.longitude),
    e => setStatus('GPS Fehler', false),
    {enableHighAccuracy:true, maximumAge:5000, timeout:10000}
  );
});

document.getElementById('btnStop').addEventListener('click', async () => {
  if (watchId!==null) navigator.geolocation.clearWatch(watchId);
  if (sessionId) await set(ref(db,'sessions/'+sessionId+'/active'), false);
  setStatus('Beendet', false);
  mapEl.style.display = 'none';
  mapEl.style.height = '';
  bottomPanel.style.display = 'none';
  setupPanel.style.display = 'flex';
  map=null; driverMarker=null; sessionId=null;
});

document.getElementById('btnShare').addEventListener('click', () => {
  if (!sessionId) return;
  const url = location.origin + '/tracker.html?session=' + sessionId;
  navigator.clipboard ? navigator.clipboard.writeText(url).then(() => {
    const b = document.getElementById('btnShare');
    b.textContent = '✅ Скопировано!';
    setTimeout(() => b.textContent = '📋 Ссылка', 2000);
  }) : prompt('Ссылка:', url);
});
</script>
</body>
</html>

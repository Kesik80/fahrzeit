<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#f0f0f0" id="themeColorMeta">
<title>Stations Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
/* ══════════════════════════════════════
   CSS-ПЕРЕМЕННЫЕ (дизайн-токены)
   Все цвета, тени, радиусы и шрифт
   хранятся здесь — меняй в одном месте
══════════════════════════════════════ */
:root {
  /* ── Фоны — из index ── */
  --bg:        #f0f0f0;
  --surface:   #ffffff;
  --surface2:  #e8e8e8;
  --border:    #cccccc;

  /* ── Текст ── */
  --text:      #333333;
  --text2:     #6c757d;

  /* ── Акцент — Bootstrap-синий из index ── */
  --accent:    #007bff;
  --accent-lt: rgba(0,123,255,0.10);

  /* ── Успех — из index ── */
  --green:     #28a745;
  --green-lt:  rgba(40,167,69,0.12);

  /* ── Опасность — из index ── */
  --red:       #dc3545;
  --red-lt:    rgba(220,53,69,0.10);

  /* ── Тени ── */
  --shadow-s:  0 1px 3px rgba(0,0,0,.10);
  --shadow-m:  0 4px 16px rgba(0,0,0,.14);
  --shadow-l:  0 12px 40px rgba(0,0,0,.20);

  /* ── Форма ── */
  --r:         12px;
  --r-sm:      6px;
  --r-pill:    100px;

  /* ── Шрифт (Manrope для редактора, как было) ── */
  --font:      'Manrope', system-ui, sans-serif;
}

/* Тёмная тема — из index */
body.dark {
  --bg:        #121212;
  --surface:   #1e1e1e;
  --surface2:  #2a2a2a;
  --border:    #333333;
  --text:      #e1e1e1;
  --text2:     #6c757d;
  --accent-lt: rgba(0,123,255,0.18);
  --green-lt:  rgba(40,167,69,0.18);
  --red-lt:    rgba(220,53,69,0.15);
  --shadow-s:  0 1px 3px rgba(0,0,0,.35);
  --shadow-m:  0 4px 16px rgba(0,0,0,.45);
  --shadow-l:  0 12px 40px rgba(0,0,0,.55);
}

/* ══════════════════════════════════════
   СБРОС СТИЛЕЙ + БАЗОВЫЕ НАСТРОЙКИ
══════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box; /* размеры включают padding и border */
  margin: 0;              /* убираем все внешние отступы браузера */
  padding: 0;             /* убираем все внутренние отступы браузера */
}

html {
  font-size: 18px;                        /* базовый размер шрифта (rem от него) */
  -webkit-tap-highlight-color: transparent; /* убираем синюю вспышку при тапе на iOS */
}

body {
  font-family: var(--font);                      /* основной шрифт из переменной */
  background: var(--bg);                         /* цвет фона страницы */
  color: var(--text);                            /* основной цвет текста */
  min-height: 100dvh;                            /* минимум на всю высоту экрана (dvh = dynamic viewport height) */
  padding-bottom: env(safe-area-inset-bottom);   /* отступ снизу для iPhone с «чёлкой» */
  transition: background .25s, color .25s;       /* плавный переход при смене темы */
}

/* ══════════════════════════════════════
   ОСНОВНОЙ КОНТЕЙНЕР
══════════════════════════════════════ */
.app {
  max-width: 480px;        /* максимальная ширина — удобно для мобильных */
  margin: 0 auto;          /* центрируем по горизонтали */
  display: flex;           /* flex-колонка для шапки + контента + панели */
  flex-direction: column;  /* элементы идут вертикально */
  min-height: 100dvh;      /* растягиваем на весь экран */
}

/* ══════════════════════════════════════
   ШАПКА
══════════════════════════════════════ */
.header {
  position: sticky;              /* шапка прилипает к верху при скролле */
  top: 0;                        /* прилипает к самому верху */
  z-index: 50;                   /* поверх остального контента */
  background: var(--surface);    /* белый / тёмный фон */
  border-bottom: 1px solid var(--border); /* тонкая линия снизу */
  padding: 12px 16px 10px;       /* отступы внутри: сверху, по бокам, снизу */
  display: flex;                 /* элементы в ряд */
  align-items: center;           /* по центру по вертикали */
  gap: 10px;                     /* отступ между логотипом, текстом и кнопкой */
  box-shadow: var(--shadow-s);   /* лёгкая тень чтобы отделить от контента */
}

.header-logo {
  width: 34px; height: 34px;                    /* квадрат 34×34 */
  background: var(--accent);                     /* синий акцентный цвет */
  border-radius: var(--r-sm);                    /* скруглённые углы */
  display: flex; align-items: center; justify-content: center; /* центрируем эмодзи */
  font-size: 18px;                               /* размер иконки */
  flex-shrink: 0;                                /* не сжимается при нехватке места */
}

.header-title {
  flex: 1;              /* занимает всё доступное пространство */
  font-size: 1.1rem;    /* чуть крупнее базового */
  font-weight: 700;     /* жирный */
  letter-spacing: -.3px; /* чуть сжатый кернинг для плотности */
}

.header-sub {
  font-size: .78rem;      /* мелкий подзаголовок */
  color: var(--text2);    /* приглушённый цвет */
  font-weight: 500;       /* средняя жирность */
  letter-spacing: .2px;   /* лёгкое разрежение букв */
}

/* Кнопка переключения темы в шапке */
.theme-btn {
  width: 36px; height: 36px;          /* квадрат 36×36 */
  border-radius: var(--r-sm);         /* скруглённые углы */
  border: 1px solid var(--border);    /* тонкая рамка */
  background: var(--surface2);        /* слегка выделяется на фоне шапки */
  cursor: pointer;                    /* курсор-рука */
  display: flex; align-items: center; justify-content: center; /* центрируем эмодзи */
  font-size: 16px;                    /* размер иконки 🌙 / ☀️ */
  transition: background .2s, transform .15s; /* анимация при hover */
  flex-shrink: 0;                     /* не сжимается */
}
.theme-btn:hover {
  background: var(--accent-lt);  /* синеватый фон при наведении */
  transform: scale(1.05);        /* лёгкое увеличение */
}

/* ══════════════════════════════════════
   СТРОКА СТАТУСА (загрузка / OK / ошибка)
══════════════════════════════════════ */
#loadStatus {
  margin: 12px 16px 0;           /* отступы: сверху и по бокам */
  padding: 10px 14px;            /* внутренние отступы */
  border-radius: var(--r-sm);    /* скруглённые углы */
  font-size: .88rem;             /* немного меньше базового */
  font-weight: 600;              /* полужирный */
  display: flex;                 /* иконка + текст в ряд */
  align-items: center;           /* по центру вертикально */
  gap: 7px;                      /* отступ между иконкой и текстом */
  transition: all .3s;           /* плавная смена цвета при изменении статуса */
}
#loadStatus.loading { background: var(--accent-lt); color: var(--accent); } /* синий — идёт загрузка */
#loadStatus.ok      { background: var(--green-lt);  color: var(--green);  } /* зелёный — успешно */
#loadStatus.err     { background: var(--red-lt);    color: var(--red);    } /* красный — ошибка */
#loadStatus::before {
  content: attr(data-icon); /* берём иконку из атрибута data-icon элемента */
  font-size: 14px;           /* размер иконки эмодзи */
}

/* ══════════════════════════════════════
   ТАБЫ ГРУПП (горизонтальный скролл)
══════════════════════════════════════ */
.tabs-wrap {
  padding: 12px 16px 0;              /* отступы вокруг полосы табов */
  overflow-x: auto;                  /* горизонтальный скролл когда табы не влезают */
  -webkit-overflow-scrolling: touch; /* плавный скролл на iOS */
  scrollbar-width: none;             /* скрываем полосу прокрутки в Firefox */
}
.tabs-wrap::-webkit-scrollbar { display: none; } /* скрываем полосу прокрутки в Chrome/Safari */

.tabs {
  display: flex;       /* табы в ряд */
  gap: 6px;            /* расстояние между табами */
  white-space: nowrap; /* не переносить на новую строку */
}

.tab {
  padding: 9px 16px;              /* внутренние отступы таба */
  border-radius: var(--r-pill);   /* полностью округлые — форма «таблетки» */
  border: 1.5px solid var(--border); /* рамка */
  background: var(--surface);     /* белый фон неактивного таба */
  color: var(--text2);            /* приглушённый цвет текста */
  font-size: .88rem;              /* размер надписи */
  font-weight: 600;               /* полужирный */
  cursor: pointer;                /* курсор-рука */
  transition: all .18s;           /* плавная анимация hover */
  white-space: nowrap;            /* текст не переносится */
  flex-shrink: 0;                 /* не сжимается */
}
.tab:hover {
  border-color: var(--accent);    /* синяя рамка при наведении */
  color: var(--accent);           /* синий текст */
  background: var(--accent-lt);   /* светло-синий фон */
}
.tab.active {
  background: var(--accent);                   /* синий фон активного таба */
  border-color: var(--accent);                 /* синяя рамка */
  color: #fff;                                 /* белый текст */
  box-shadow: 0 2px 8px rgba(61,90,254,.3);   /* синяя тень под активным табом */
}

/* ══════════════════════════════════════
   ОБЛАСТЬ КОНТЕНТА
══════════════════════════════════════ */
.content {
  flex: 1;                    /* занимает всё оставшееся пространство между шапкой и панелью */
  padding: 12px 16px 80px;   /* 80px снизу — место для фиксированной панели инструментов */
  overflow-y: auto;           /* скролл если контент не влезает */
}

/* ══════════════════════════════════════
   КАРТОЧКИ (строки списка)
══════════════════════════════════════ */
.card {
  background: var(--surface);           /* белый / тёмный фон карточки */
  border: 1px solid var(--border);      /* рамка */
  border-radius: var(--r-sm);           /* скруглённые углы */
  padding: 4px 0px 4px 10px;           /* меньше справа — крестик у края */
  margin-bottom: 8px;                  /* отступ снизу между карточками */
  display: flex;                        /* содержимое в ряд */
  align-items: center;                  /* по центру вертикально */
  gap: 8px;                             /* расстояние между элементами внутри */
  box-shadow: var(--shadow-s);          /* лёгкая тень */
  transition: box-shadow .2s, border-color .2s; /* анимация при hover */
  position: relative;                   /* нужно для абсолютных дочерних элементов */
  cursor: default;                      /* обычный курсор (не текстовый) */
}
.card:hover {
  box-shadow: var(--shadow-m);   /* более сильная тень при наведении */
  border-color: var(--accent);   /* синяя рамка при наведении */
}

.card.group-card {
  border-left: 3px solid var(--accent); /* синяя полоска слева — это группа */
}

.card.sub-card {
  margin-left: 10px;               /* отступ слева — визуально вложено */
  background: var(--surface2);     /* чуть другой фон для вложенных */
  border-left: 2px solid var(--accent); /* более тонкая синяя полоска */
  border-radius: var(--r-sm);      /* меньший радиус скругления */
  padding: 6px 0 6px 10px;         /* без правого padding — крестик у края */
}

/* Иконка перетаскивания (drag & drop) */
.drag-handle {
  color: var(--text2);   /* приглушённый цвет */
  font-size: 18px;       /* размер точечного символа ⠿ */
  cursor: grab;          /* курсор «рука схватить» */
  flex-shrink: 0;        /* не сжимается */
  opacity: .4;           /* почти прозрачный в покое */
  transition: opacity .2s; /* плавное появление */
  user-select: none;     /* нельзя выделить текстом */
  padding: 6px 20px 6px 30px; /* увеличенная зона захвата */
}
.card:hover .drag-handle { opacity: .7; } /* становится видимее при hover на карточку */

/* Название записи в карточке (кликабельно для переименования) */
.card-name {
  flex: 1;               /* занимает всё свободное место */
  font-size: 1rem;       /* базовый размер */
  font-weight: 600;      /* полужирный */
  color: var(--text);    /* основной цвет текста */
  min-width: 0;          /* позволяет flex-элементу сжаться меньше контента */
  overflow: hidden;      /* обрезаем длинный текст */
  text-overflow: ellipsis; /* «…» в конце обрезанного текста */
  white-space: nowrap;   /* не переносим на новую строку */
  cursor: pointer;       /* курсор-рука — намекаем что можно кликнуть */
  border-radius: 5px;    /* скругление для подсветки при hover */
  padding: 2px 4px;      /* небольшой padding для подсветки */
  margin: -2px -4px;     /* компенсируем padding чтобы не смещало */
  transition: background .15s; /* анимация появления фона */
}
.card-name:hover { background: var(--accent-lt); } /* синеватый фон при наведении */

/* Поле ввода при редактировании имени (появляется вместо .card-name) */
.card-name-input {
  flex: 1;                              /* занимает место .card-name */
  font-size: 1rem;                      /* тот же размер */
  font-weight: 600;                     /* та же жирность */
  font-family: var(--font);             /* тот же шрифт */
  color: var(--text);                   /* основной цвет */
  background: var(--accent-lt);         /* светло-синий фон — активное состояние */
  border: 1.5px solid var(--accent);    /* синяя рамка */
  border-radius: 6px;                   /* скруглённые углы */
  padding: 5px 10px;                    /* внутренние отступы */
  min-width: 0;                         /* может сжиматься */
  outline: none;                        /* убираем стандартный синий outline браузера */
}

/* Обёртка поля координат */
.card-coord {
  flex: 0 0 auto; /* не растягивается и не сжимается */
  width: 130px;   /* фиксированная ширина для поля "lat, lng" */
}

/* Поле координат и поле времени (общие стили) */
.card-coord input, .card-time-input {
  width: 100%;                          /* на всю ширину обёртки */
  font-family: var(--font);             /* основной шрифт */
  font-size: .72rem;                    /* мелкий — координаты не главное */
  color: var(--text2);                  /* приглушённый цвет в покое */
  background: var(--surface2);          /* слегка выделяется на фоне карточки */
  border: 1px solid var(--border);      /* рамка */
  border-radius: 6px;                   /* скруглённые углы */
  padding: 7px 10px;                    /* внутренние отступы */
  outline: none;                        /* убираем outline браузера */
  transition: border-color .15s, background .15s; /* анимация фокуса */
}
.card-coord input:focus, .card-time-input:focus {
  border-color: var(--accent);   /* синяя рамка при фокусе */
  background: var(--accent-lt);  /* светло-синий фон при фокусе */
  color: var(--text);            /* полный цвет текста при фокусе */
}

.card-time-input {
  width: 54px;         /* узкое поле только для числа */
  text-align: center;  /* число по центру */
  font-weight: 600;    /* жирнее — это важная цифра */
}

/* Кнопка удаления записи (красный крестик) */
.del-btn {
  width: 28px; height: 28px;            /* размер кнопки */
  border-radius: 0;                     /* без скруглений — вплотную к краю */
  border: none;                         /* без рамки */
  background: transparent;              /* прозрачный фон */
  color: var(--red);                    /* красный крестик */
  font-size: 14px;                      /* размер символа ✖ */
  font-weight: 700;                     /* жирный крестик */
  cursor: pointer;                      /* курсор-рука */
  display: flex; align-items: center; justify-content: center; /* центрируем символ */
  flex-shrink: 0;                       /* не сжимается */
  transition: color .15s, transform .12s; /* анимация при hover */
  opacity: .5;                          /* приглушён в покое */
  padding: 0;                           /* без внутренних отступов */
  margin: -10px 0 0 0;                  /* только вверх, без боковых отступов */
  align-self: flex-start;               /* прижимаем к верху карточки */
}
.del-btn:hover {
  background: var(--red-lt); /* лёгкий красный фон при наведении */
  color: var(--red);          /* красный крестик */
  opacity: 1;                 /* полная непрозрачность */
  transform: scale(1.1);      /* лёгкое увеличение */
}

/* Кнопка добавления участника в группу (синий плюс) */
.add-sub-btn {
  width: 32px; height: 32px;            /* квадрат 32×32 */
  border-radius: 50%;                   /* полностью круглая */
  border: 1.5px solid var(--accent);    /* синяя рамка */
  background: var(--accent-lt);         /* светло-синий фон */
  color: var(--accent);                 /* синий плюс */
  font-size: 18px;                      /* размер символа + */
  font-weight: 700;                     /* жирный */
  cursor: pointer;                      /* курсор-рука */
  display: flex; align-items: center; justify-content: center; /* центрируем + */
  flex-shrink: 0;                       /* не сжимается */
  transition: all .15s;                 /* анимация всех свойств */
  line-height: 1;                       /* чтобы + не съезжал */
}
.add-sub-btn:hover {
  background: var(--accent); /* синий фон при наведении */
  color: #fff;               /* белый + */
  transform: scale(1.1);     /* лёгкое увеличение */
}

/* Отступ для вложенных участников группы */
.group-indent { margin-left: 20px; } /* сдвигаем блок субучастников вправо */

/* Кнопка Google Maps иконка на карточке времени */
.google-map-btn {
  width: 22px; height: 22px;      /* размер под SVG 16×16 */
  border: none;                    /* без рамки */
  background: transparent;         /* прозрачный фон */
  cursor: pointer;                 /* курсор-рука */
  padding: 0;                      /* без отступов */
  flex-shrink: 0;                  /* не сжимается */
  display: flex; align-items: center; justify-content: center;
  opacity: .7;                     /* немного прозрачная в покое */
  transition: opacity .15s, transform .15s;
  margin-left: 2px;
}
.google-map-btn:hover { opacity: 1; transform: scale(1.15); }
.google-map-btn:active { transform: scale(.95); }

/* Подпись «мин» / «ч» рядом с полем времени */
.time-min {
  font-size: .82rem;    /* мелкий текст */
  color: var(--text2);  /* приглушённый цвет */
  font-weight: 500;     /* средняя жирность */
  margin-left: 2px;     /* небольшой отступ от поля числа */
  min-width: 2rem;      /* минимальная ширина — «мин» и «ч» не сдвигают поле */
  display: inline-block; /* чтобы min-width работал */
}

/* ══════════════════════════════════════
   СТРОКА ВЫБОРА ВОДИТЕЛЯ (вкладка «Порядок»)
══════════════════════════════════════ */
.driver-row {
  display: flex;                    /* элементы в ряд */
  align-items: center;              /* по центру вертикально */
  gap: 8px;                         /* расстояние между label, select и кнопкой + */
  margin-bottom: 12px;              /* отступ снизу перед списком */
  background: var(--surface);       /* белый / тёмный фон */
  border: 1px solid var(--border);  /* рамка */
  border-radius: var(--r);          /* скруглённые углы */
  padding: 10px 12px;               /* внутренние отступы */
  box-shadow: var(--shadow-s);      /* лёгкая тень */
}

.driver-row label {
  font-size: .82rem;        /* мелкий */
  font-weight: 700;         /* жирный */
  text-transform: uppercase; /* ЗАГЛАВНЫЕ */
  letter-spacing: .6px;     /* разрежение букв */
  color: var(--text2);      /* приглушённый цвет */
  flex-shrink: 0;           /* не сжимается */
}

.driver-row select {
  flex: 1;                          /* занимает всё свободное место */
  font-family: var(--font);         /* основной шрифт */
  font-size: 1rem;                  /* базовый размер */
  font-weight: 600;                 /* полужирный */
  color: var(--text);               /* основной цвет текста */
  background: var(--surface2);      /* фон поля */
  border: 1px solid var(--border);  /* рамка */
  border-radius: var(--r-sm);       /* скруглённые углы */
  padding: 8px 10px;                /* внутренние отступы */
  outline: none;                    /* убираем outline браузера */
  cursor: pointer;                  /* курсор-рука */
}
.driver-row select:focus { border-color: var(--accent); } /* синяя рамка при фокусе */

/* ══════════════════════════════════════
   БЛОК JSON (сворачиваемый)
══════════════════════════════════════ */
.raw-block {
  margin-top: 16px; /* отступ сверху от списка карточек */
}

/* Кнопка-заголовок «{ } JSON» для разворачивания */
.raw-toggle {
  width: 100%;                          /* на всю ширину */
  display: flex;                        /* иконка + текст + стрелка в ряд */
  align-items: center;                  /* по центру вертикально */
  gap: 8px;                             /* расстояние между элементами */
  padding: 10px 14px;                   /* внутренние отступы */
  background: var(--surface);           /* фон кнопки */
  border: 1px solid var(--border);      /* рамка */
  border-radius: var(--r);              /* скруглённые углы */
  font-family: var(--font);             /* основной шрифт */
  font-size: .82rem;                    /* мелкий */
  font-weight: 700;                     /* жирный */
  text-transform: uppercase;            /* ЗАГЛАВНЫЕ */
  letter-spacing: .5px;                 /* разрежение букв */
  color: var(--text2);                  /* приглушённый цвет */
  cursor: pointer;                      /* курсор-рука */
  transition: all .18s;                 /* анимация hover */
  box-shadow: var(--shadow-s);          /* лёгкая тень */
}
.raw-toggle:hover {
  border-color: var(--accent);   /* синяя рамка при наведении */
  color: var(--accent);          /* синий текст */
  background: var(--accent-lt);  /* светло-синий фон */
}

.raw-toggle-arrow {
  margin-left: auto;        /* прижимаем стрелку к правому краю */
  font-size: 12px;          /* маленькая стрелка ▼ */
  transition: transform .25s; /* плавный поворот при открытии */
}
.raw-toggle.open .raw-toggle-arrow {
  transform: rotate(180deg); /* стрелка смотрит вверх когда блок открыт */
}

.raw-body {
  display: none;   /* скрыт по умолчанию */
  margin-top: 4px; /* небольшой отступ между кнопкой и textarea */
}
.raw-body.open { display: block; } /* показываем при добавлении класса .open */

.raw-block textarea {
  width: 100%;                             /* на всю ширину */
  min-height: 500px;                       /* минимальная высота */
  font-family: 'SF Mono', 'Fira Code', monospace; /* моноширинный шрифт для кода */
  font-size: .78rem;                       /* мелкий — много текста */
  line-height: 1.5;                        /* межстрочный интервал для читаемости */
  color: var(--text);                      /* основной цвет */
  background: var(--surface);              /* белый / тёмный фон */
  border: 1px solid var(--border);         /* рамка */
  border-radius: 0 0 var(--r) var(--r);   /* скругляем только нижние углы (верхние — у кнопки) */
  padding: 12px;                           /* внутренние отступы */
  resize: vertical;                        /* можно растягивать только по вертикали */
  outline: none;                           /* убираем outline браузера */
  transition: border-color .15s;           /* анимация рамки при фокусе */
}
.raw-block textarea:focus { border-color: var(--accent); } /* синяя рамка при фокусе */

/* ══════════════════════════════════════
   НИЖНЯЯ ПАНЕЛЬ ИНСТРУМЕНТОВ (фиксированная)
══════════════════════════════════════ */
.toolbar {
  position: fixed;                                       /* фиксирована внизу экрана */
  bottom: 0; left: 0; right: 0;                         /* от края до края */
  background: var(--surface);                            /* белый / тёмный фон */
  border-top: 1px solid var(--border);                   /* тонкая линия сверху */
  padding: 8px 12px max(8px, env(safe-area-inset-bottom)); /* отступ снизу для iPhone */
  display: flex;                                         /* кнопки в ряд */
  gap: 6px;                                              /* расстояние между кнопками */
  z-index: 50;                                           /* поверх контента */
  box-shadow: 0 -4px 20px rgba(22,27,46,.08);            /* тень вверх */
}

.toolbar-center {
  max-width: 480px;  /* ограничиваем по ширине как .app */
  margin: 0 auto;    /* центрируем */
  width: 100%;       /* на всю доступную ширину */
  display: flex;     /* кнопки в ряд */
  gap: 6px;          /* расстояние между кнопками */
}

/* Обычная кнопка панели инструментов */
.tbtn {
  flex: 1;                    /* все кнопки одинаковой ширины */
  height: 52px;               /* высота кнопки */
  border-radius: var(--r);    /* скруглённые углы */
  border: 1.5px solid var(--border); /* рамка */
  background: var(--surface2); /* фон */
  color: var(--text);          /* цвет текста и иконки */
  font-family: var(--font);    /* основной шрифт */
  font-size: .72rem;           /* мелкая подпись под иконкой */
  font-weight: 700;            /* жирная */
  cursor: pointer;             /* курсор-рука */
  display: flex;               /* иконка над текстом */
  flex-direction: column;      /* вертикально */
  align-items: center;         /* по центру горизонтально */
  justify-content: center;     /* по центру вертикально */
  gap: 2px;                    /* отступ между иконкой и подписью */
  transition: all .18s;        /* анимация hover */
  line-height: 1.1;            /* межстрочный интервал */
}
.tbtn:hover {
  background: var(--accent-lt);   /* светло-синий фон */
  border-color: var(--accent);    /* синяя рамка */
  color: var(--accent);           /* синий текст */
}
.tbtn:active { transform: scale(.96); }   /* нажатие — слегка уменьшается */
.tbtn:disabled { opacity: .3; cursor: not-allowed; } /* недоступная кнопка */
.tbtn:disabled:hover {
  background: var(--surface2);   /* отменяем hover для недоступной */
  border-color: var(--border);
  color: var(--text);
  transform: none;
}

.tbtn-icon {
  font-size: 20px; /* размер эмодзи-иконки */
  line-height: 1;  /* чтобы не было лишних отступов */
}

/* Акцентная кнопка «Добавить» (синяя) */
.tbtn.primary {
  background: var(--accent);                     /* синий фон */
  border-color: var(--accent);                   /* синяя рамка */
  color: #fff;                                   /* белый текст */
  box-shadow: 0 2px 8px rgba(61,90,254,.3);      /* синяя тень */
}
.tbtn.primary:hover { opacity: .9; } /* чуть прозрачнее при наведении */

/* Кнопка «Скачать» (зелёная) */
.tbtn.success {
  background: var(--green);                      /* зелёный фон */
  border-color: var(--green);                    /* зелёная рамка */
  color: #fff;                                   /* белый текст */
  box-shadow: 0 2px 8px rgba(0,200,150,.3);      /* зелёная тень */
}
.tbtn.success:hover { opacity: .9; } /* чуть прозрачнее при наведении */

/* ══════════════════════════════════════
   МОДАЛЬНЫЕ ОКНА (снизу вверх — bottom sheet)
══════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  padding: 0 0 24px 0;
  box-sizing: border-box;
}
.modal-overlay.show { display: flex; }

/* Само модальное окно */
.modal-sheet {
  background: var(--surface);
  width: 92%;
  max-width: 460px;
  border-radius: 22px;
  padding: 20px 20px 24px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.4);
  animation: slideUp .28s cubic-bezier(.32,.72,0,1);
}

/* Анимация появления — sheet едет снизу вверх */
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; } /* начинает снизу, невидимый */
  to   { transform: translateY(0);    opacity: 1; } /* приходит на место */
}

/* Декоративная ручка вверху модалки (как в iOS) */
.modal-handle {
  width: 36px; height: 4px;   /* прямоугольник 36×4 */
  background: var(--border);   /* цвет рамок */
  border-radius: 2px;          /* скруглённый */
  margin: 0 auto 18px;         /* центрируем, отступ снизу */
}

/* Заголовок модального окна */
.modal-title {
  font-size: 1.05rem;     /* чуть крупнее базового */
  font-weight: 800;       /* очень жирный */
  margin-bottom: 16px;    /* отступ до полей */
  color: var(--text);     /* основной цвет */
}

/* Подпись над полем ввода */
.field-label {
  font-size: .78rem;        /* мелкий */
  font-weight: 700;         /* жирный */
  text-transform: uppercase; /* ЗАГЛАВНЫЕ */
  letter-spacing: .5px;     /* разрежение букв */
  color: var(--text2);      /* приглушённый цвет */
  margin-bottom: 5px;       /* отступ до поля */
  margin-top: 12px;         /* отступ от предыдущего поля */
}
.field-label:first-of-type { margin-top: 0; } /* первая подпись без верхнего отступа */

/* Текстовое поле и select внутри модалки */
.modal-input, .modal-select {
  width: 100%;                          /* на всю ширину */
  font-family: var(--font);             /* основной шрифт */
  font-size: 1rem;                      /* базовый размер */
  font-weight: 500;                     /* средняя жирность */
  color: var(--text);                   /* основной цвет */
  background: var(--surface2);          /* фон поля */
  border: 1.5px solid var(--border);    /* рамка */
  border-radius: var(--r-sm);           /* скруглённые углы */
  padding: 13px 14px;                   /* удобные отступы для тапа */
  outline: none;                        /* убираем outline браузера */
  transition: border-color .15s;        /* анимация рамки при фокусе */
}
.modal-input:focus, .modal-select:focus {
  border-color: var(--accent); /* синяя рамка при фокусе */
}

/* Блок с кнопками «Отмена» и «Добавить» */
.modal-btns {
  display: flex;     /* кнопки в ряд */
  gap: 8px;          /* расстояние между кнопками */
  margin-top: 18px;  /* отступ от последнего поля */
}

/* Базовая кнопка внутри модалки */
.mbtn {
  flex: 1;                   /* обе кнопки одинаковой ширины */
  height: 48px;              /* удобная высота для тапа */
  border-radius: var(--r);   /* скруглённые углы */
  border: none;              /* без рамки (для confirm) */
  font-family: var(--font);  /* основной шрифт */
  font-size: .9rem;          /* размер текста */
  font-weight: 700;          /* жирный */
  cursor: pointer;           /* курсор-рука */
  transition: all .18s;      /* анимация hover */
}
.mbtn:active { transform: scale(.98); } /* нажатие — слегка уменьшается */

/* Кнопка подтверждения (синяя) */
.mbtn-confirm {
  background: var(--accent);                    /* синий фон */
  color: #fff;                                  /* белый текст */
  box-shadow: 0 2px 10px rgba(61,90,254,.35);   /* синяя тень */
}
.mbtn-confirm:hover { opacity: .9; } /* чуть прозрачнее при наведении */

/* Кнопка отмены (серая) */
.mbtn-cancel {
  background: var(--surface2);          /* серый фон */
  color: var(--text2);                  /* приглушённый текст */
  border: 1.5px solid var(--border);    /* рамка */
}
.mbtn-cancel:hover {
  border-color: var(--accent);   /* синяя рамка при наведении */
  color: var(--accent);          /* синий текст */
  background: var(--accent-lt);  /* светло-синий фон */
}

/* Кнопки выбора типа (крупные, с иконкой) */
.type-btn {
  width: 100%;                          /* на всю ширину */
  padding: 14px;                        /* просторные внутренние отступы */
  border-radius: var(--r);              /* скруглённые углы */
  border: 1.5px solid var(--border);    /* рамка */
  background: var(--surface2);          /* фон */
  font-family: var(--font);             /* основной шрифт */
  font-size: .92rem;                    /* размер текста */
  font-weight: 700;                     /* жирный */
  color: var(--text);                   /* основной цвет */
  cursor: pointer;                      /* курсор-рука */
  text-align: left;                     /* текст прижат влево */
  display: flex;                        /* иконка + текст в ряд */
  align-items: center;                  /* по центру вертикально */
  gap: 10px;                            /* расстояние между иконкой и текстом */
  margin-bottom: 8px;                   /* отступ между кнопками */
  transition: all .18s;                 /* анимация hover */
}
.type-btn:hover {
  border-color: var(--accent);   /* синяя рамка */
  background: var(--accent-lt);  /* светло-синий фон */
  color: var(--accent);          /* синий текст */
}

/* Иконка-квадрат внутри type-btn */
.type-btn-icon {
  width: 36px; height: 36px;   /* квадрат 36×36 */
  border-radius: var(--r-sm);  /* скруглённые углы */
  display: flex; align-items: center; justify-content: center; /* центрируем эмодзи */
  font-size: 18px;             /* размер эмодзи */
  flex-shrink: 0;              /* не сжимается */
}
.tb-blue  .type-btn-icon { background: var(--accent-lt); } /* синий фон для type-btn синего типа */
.tb-green .type-btn-icon { background: var(--green-lt); }  /* зелёный фон для type-btn зелёного типа */

/* Разделитель внутри GitHub-модалки */
.gh-divider {
  border: none;                         /* убираем стандартную рамку hr */
  border-top: 1px solid var(--border);  /* только верхняя линия */
  margin: 16px 0;                       /* вертикальные отступы */
}

/* Заголовок секции внутри GitHub-модалки */
.gh-section-title {
  font-size: .78rem;        /* мелкий */
  font-weight: 700;         /* жирный */
  color: var(--text2);      /* приглушённый цвет */
  margin-bottom: 8px;       /* отступ до элемента секции */
  text-transform: uppercase; /* ЗАГЛАВНЫЕ */
  letter-spacing: .5px;     /* разрежение букв */
}

/* Подсказка о сохранённом токене */
.token-hint {
  font-size: .72rem;    /* мелкий */
  color: var(--green);  /* зелёный — знак что всё ок */
  margin-top: 4px;      /* небольшой отступ от поля токена */
  font-weight: 600;     /* полужирный */
}

/* ══════════════════════════════════════
   ВСПЛЫВАЮЩЕЕ УВЕДОМЛЕНИЕ (toast)
══════════════════════════════════════ */
#toast {
  position: fixed;                          /* поверх всего */
  bottom: 72px;                             /* над панелью инструментов */
  left: 50%;                                /* начинаем с центра */
  transform: translateX(-50%) translateY(10px); /* центрируем и чуть опускаем (скрыт) */
  background: var(--text);                  /* тёмный фон (инвертирован от основного) */
  color: var(--bg);                         /* светлый текст */
  padding: 10px 20px;                       /* внутренние отступы */
  border-radius: var(--r-pill);             /* форма «таблетки» */
  font-size: .82rem;                        /* мелкий текст */
  font-weight: 600;                         /* полужирный */
  opacity: 0;                               /* невидим по умолчанию */
  pointer-events: none;                     /* не перехватывает клики */
  z-index: 500;                             /* поверх модалок */
  transition: opacity .2s, transform .2s;   /* плавное появление */
  white-space: nowrap;                      /* текст в одну строку */
  max-width: calc(100vw - 32px);            /* не шире экрана минус отступы */
  text-align: center;                       /* текст по центру */
}
#toast.visible {
  opacity: 1;                              /* полностью видим */
  transform: translateX(-50%) translateY(0); /* возвращаем на место */
}

/* ══════════════════════════════════════
   ПУСТОЕ СОСТОЯНИЕ (когда список пуст)
══════════════════════════════════════ */
.empty-state {
  text-align: center;   /* всё по центру */
  padding: 40px 20px;   /* просторные отступы */
  color: var(--text2);  /* приглушённый цвет */
}
.empty-state-icon {
  font-size: 36px;     /* крупная иконка */
  margin-bottom: 10px; /* отступ до текста */
}
.empty-state p {
  font-size: .88rem;  /* мелкий текст */
  font-weight: 500;   /* средняя жирность */
}

/* ══════════════════════════════════════
   DRAG & DROP (визуальная обратная связь)
══════════════════════════════════════ */
.sortable-ghost {
  opacity: .3;                           /* призрак на старом месте — почти прозрачный */
  background: var(--accent-lt) !important; /* синеватый фон призрака */
}
.sortable-chosen {
  box-shadow: var(--shadow-l) !important; /* сильная тень у перетаскиваемого элемента */
}

/* ══════════════════════════════════════
   СЧЁТЧИК ЗАПИСЕЙ В РАЗДЕЛЕ
══════════════════════════════════════ */
.section-count {
  font-size: .7rem;
  font-weight: 700;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  padding: 2px 8px;
  color: var(--text2);
  margin-left: auto;
}

/* ══════════════════════════════════════
   BOTTOM SHEET (выбор участника)
   — точно как в index
══════════════════════════════════════ */
.bs-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  z-index: 9999;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 0 0 24px 0;
  box-sizing: border-box;
}
.bs-overlay.show { display: flex; }

.bs-sheet {
  width: 92%;
  max-width: 460px;
  height: 72vh;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -12px 48px rgba(0,0,0,0.4);
  background: var(--surface);
  color: var(--text);
  animation: slideUp .28s cubic-bezier(.32,.72,0,1);
}
.bs-handle {
  width: 40px; height: 4px;
  border-radius: 2px;
  background: currentColor;
  opacity: .2;
  margin: 14px auto 0;
  flex-shrink: 0;
}
.bs-header {
  padding: 12px 20px 14px;
  flex-shrink: 0;
}
.bs-title {
  font-size: 1.1em;
  font-weight: 700;
  letter-spacing: -.01em;
  color: var(--text);
}
.bs-tabs {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.bs-tab {
  flex: 1;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  font-size: .88em;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text);
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-family: var(--font);
}
.bs-tab.active {
  background: var(--accent) !important;
  color: #fff !important;
  border-color: var(--accent) !important;
}
.bs-divider {
  height: 1px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 20px;
  opacity: .5;
}
.bs-list-label {
  font-size: .68em;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  opacity: .35;
  padding: 10px 20px 4px;
  flex-shrink: 0;
  color: var(--text);
}
.bs-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: 4px 0;
}
.bs-list-item {
  width: 100%;
  padding: 15px 24px;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  font-size: 1em;
  text-align: left;
  cursor: pointer;
  display: block;
  box-sizing: border-box;
  color: var(--text);
  font-family: var(--font);
  transition: background .1s;
  opacity: .85;
}
.bs-list-item:last-child { border-bottom: none; }
.bs-list-item:active,
.bs-list-item:hover { background: var(--accent-lt); opacity: 1; }
.bs-list-item.bs-add-new {
  color: var(--accent);
  font-weight: 500;
  font-size: .93em;
  opacity: .9;
  border-top: 1px solid var(--border);
  border-bottom: none;
}
.bs-footer {
  padding: 12px 16px max(20px, env(safe-area-inset-bottom));
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
.bs-btn-cancel {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  font-size: .95em;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text2);

<script>
// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const GH_OWNER   = 'Kesik80';
const GH_REPO    = 'fahrzeit';
const GH_FILE    = 'stations.js';
const GH_RAW_URL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;
const DEFAULT_TT = 5;

// ═══════════════════════════════════════
//  GOOGLE API (через Vercel, тот же домен)
// ═══════════════════════════════════════

// SVG иконка Google Maps — цветная (рассчитано через API)
const coloredMapSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92.3 132.3" width="16" height="16"><path fill="#1a73e8" d="M60.2 2.2C55.8.8 51 0 46.1 0 32 0 19.3 6.4 10.8 16.5l21.8 18.3L60.2 2.2z"/><path fill="#ea4335" d="M10.8 16.5C4.1 24.5 0 34.9 0 46.1c0 8.7 1.7 15.7 4.6 22l28-33.3-21.8-18.3z"/><path fill="#4285f4" d="M46.2 28.5c9.8 0 17.7 7.9 17.7 17.7 0 4.3-1.6 8.3-4.2 11.4 0 0 13.9-16.6 27.5-32.7-5.6-10.8-15.3-19-27-22.7L32.6 34.8c3.3-3.8 8.1-6.3 13.6-6.3"/><path fill="#fbbc04" d="M46.2 63.8c-9.8 0-17.7-7.9-17.7-17.7 0-4.3 1.5-8.3 4.1-11.3l-28 33.3c4.8 10.6 12.8 19.2 21 29.9l34.1-40.5c-3.3 3.9-8.1 6.3-13.5 6.3"/><path fill="#34a853" d="M59.1 109.2c15.4-24.1 33.3-35 33.3-63 0-7.7-1.9-14.9-5.2-21.3L25.6 98c2.6 3.4 5.3 7.3 7.9 11.3 9.4 14.5 6.8 23.1 12.8 23.1s3.4-8.7 12.8-23.2"/></svg>`;
// SVG иконка Google Maps — серая (не рассчитано / изменено вручную)
const grayMapSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92.3 132.3" width="16" height="16"><path fill="#bbb" d="M60.2 2.2C55.8.8 51 0 46.1 0 32 0 19.3 6.4 10.8 16.5l21.8 18.3L60.2 2.2z"/><path fill="#bbb" d="M10.8 16.5C4.1 24.5 0 34.9 0 46.1c0 8.7 1.7 15.7 4.6 22l28-33.3-21.8-18.3z"/><path fill="#bbb" d="M46.2 28.5c9.8 0 17.7 7.9 17.7 17.7 0 4.3-1.6 8.3-4.2 11.4 0 0 13.9-16.6 27.5-32.7-5.6-10.8-15.3-19-27-22.7L32.6 34.8c3.3-3.8 8.1-6.3 13.6-6.3"/><path fill="#bbb" d="M46.2 63.8c-9.8 0-17.7-7.9-17.7-17.7 0-4.3 1.5-8.3 4.1-11.3l-28 33.3c4.8 10.6 12.8 19.2 21 29.9l34.1-40.5c-3.3 3.9-8.1 6.3-13.5 6.3"/><path fill="#bbb" d="M59.1 109.2c15.4-24.1 33.3-35 33.3-63 0-7.7-1.9-14.9-5.2-21.3L25.6 98c2.6 3.4 5.3 7.3 7.9 11.3 9.4 14.5 6.8 23.1 12.8 23.1s3.4-8.7 12.8-23.2"/></svg>`;

function flagKey(key, isTreff) { return (isTreff ? 'treff:' : 'tt:') + key; }
function setAutoFlag(key, isTreff, val) { autoCalcFlags[flagKey(key, isTreff)] = val; }
function getAutoFlag(key, isTreff) { return !!autoCalcFlags[flagKey(key, isTreff)]; }

// Запрос времени в пути между двумя координатами → минуты
async function fetchTravelTime(originLat, originLng, destLat, destLng) {
  const resp = await fetch('/api/calculate-time', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ originLat, originLng, destLat, destLng })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${resp.status}`);
  }
  const d = await resp.json();
  if (!d.success) throw new Error('API вернул ошибку');
  return d.duration.minutes;
}

// Получить координаты участника/станции по имени
function getCoordsFor(name) {
  return data.defaultCoords[name] || data.stations[name] || null;
}

// Разбить ключ "Имя1-Имя2" на два имени, учитывая что имена могут содержать дефис
function splitPairKey(key, isTreff) {
  const sourceNames = isTreff
    ? Object.keys(treffpunkt)
    : [...Object.keys(data.defaultCoords), ...Object.keys(data.stations)];
  const destNames = [...Object.keys(data.defaultCoords), ...Object.keys(data.stations)];

  for (const a of sourceNames) {
    if (key.startsWith(a + '-')) {
      const b = key.slice(a.length + 1);
      if (destNames.includes(b)) return [a, b];
    }
  }
  // Запасной вариант — первый дефис
  const i = key.indexOf('-');
  return [key.slice(0, i), key.slice(i + 1)];
}

// Пересчёт одной пары travelTimes
async function recalcOne(key, src, btnEl) {
  const [a, b] = splitPairKey(key, false);
  const cA = getCoordsFor(a), cB = getCoordsFor(b);
  if (!cA || !cB) { showMsg(`❌ Нет координат: ${!cA ? a : b}`); return; }
  const orig = btnEl.innerHTML; btnEl.innerHTML = '⏳'; btnEl.disabled = true;
  try {
    src[key] = await fetchTravelTime(cA.lat, cA.lng, cB.lat, cB.lng);
    setAutoFlag(key, false, true);
    render(); showMsg(`✅ ${key}: ${src[key]} мин`);
  } catch(e) {
    showMsg(`❌ ${e.message}`, 3000);
    btnEl.innerHTML = orig; btnEl.disabled = false;
  }
}

// Пересчёт одной пары trefftravelTimes
async function recalcOneTreff(key, btnEl) {
  const [treffName, partName] = splitPairKey(key, true);
  const cT = treffpunkt[treffName], cP = getCoordsFor(partName);
  if (!cT || !cP) { showMsg(`❌ Нет координат: ${!cT ? treffName : partName}`); return; }
  const orig = btnEl.innerHTML; btnEl.innerHTML = '⏳'; btnEl.disabled = true;
  try {
    trefftravelTimes[key] = await fetchTravelTime(cT.lat, cT.lng, cP.lat, cP.lng);
    setAutoFlag(key, true, true);
    render(); showMsg(`✅ ${key}: ${trefftravelTimes[key]} мин`);
  } catch(e) {
    showMsg(`❌ ${e.message}`, 3000);
    btnEl.innerHTML = orig; btnEl.disabled = false;
  }
}

// Тихий авторасчёт одной пары (при добавлении)
async function autoCalcPair(key, isTreff) {
  try {
    const [a, b] = splitPairKey(key, isTreff);
    if (isTreff) {
      const cT = treffpunkt[a], cP = getCoordsFor(b);
      if (cT && cP) { trefftravelTimes[key] = await fetchTravelTime(cT.lat, cT.lng, cP.lat, cP.lng); setAutoFlag(key, true, true); }
    } else {
      const cA = getCoordsFor(a), cB = getCoordsFor(b);
      if (cA && cB) { travelTimes[key] = await fetchTravelTime(cA.lat, cA.lng, cB.lat, cB.lng); setAutoFlag(key, false, true); }
    }
    render(); showMsg(`✅ Время рассчитано: ${key}`);
  } catch(e) {
    console.warn('autoCalc:', key, e.message);
  }
}

// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
let data = { defaultCoords: {}, stations: {} };
let travelTimes = {}, participantOrders = {}, treffpunkt = {}, trefftravelTimes = {};
let defaultGreetings = [];
let defaultMachineDestinations = [];
let farewellText = 'Tschüss 👋';
let farewellList = ['Tschüss 👋', 'Bis bald 👋', 'Bis später 🙂', 'Auf Wiedersehen 👋'];
let startPassengers = {}; // { 'DriverName': ['Name1','Name2'] }
// Флаги: true = рассчитано через Google API, false/undefined = вручную
let autoCalcFlags = {}; // ключ: "tt:Имя1-Имя2" или "treff:Ключ"

// ═══════════════════════════════════════
//  THEME
// ═══════════════════════════════════════
const themeBtn = document.getElementById('themeBtn');
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.theme = dark ? 'dark' : 'light';
  document.getElementById('themeColorMeta').content = dark ? '#121212' : '#f0f0f0';
}
applyTheme(localStorage.theme === 'dark');
themeBtn.onclick = () => applyTheme(!document.body.classList.contains('dark'));

// ═══════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════
function setStatus(cls, text, icon) {
  const el = document.getElementById('loadStatus');
  el.className = cls;
  el.setAttribute('data-icon', icon || (cls === 'ok' ? '✅' : cls === 'err' ? '❌' : '⏳'));
  el.textContent = text;
}
function updateHeaderSub() {
  const dc = Object.keys(data.defaultCoords).length;
  const st = Object.keys(data.stations).length;
  document.getElementById('headerSub').textContent = `${dc} участников · ${st} станций`;
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
let _toastT;
function showMsg(text, ms = 1800) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('visible');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => t.classList.remove('visible'), ms);
}

// ═══════════════════════════════════════
//  MODAL HELPERS
// ═══════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });
});

// ═══════════════════════════════════════
//  TABS
// ═══════════════════════════════════════
let currentGroup = 'defaultCoords';
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentGroup = tab.dataset.group;
  render();
});

// ═══════════════════════════════════════
//  GITHUB LOAD
// ═══════════════════════════════════════
async function loadFromGitHub() {
  setStatus('loading', 'Загрузка stations.js с GitHub…', '⏳');
  try {
    const resp = await fetch(GH_RAW_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    parseStationsText(await resp.text());
    setStatus('ok', 'stations.js загружен с GitHub', '✅');
    document.getElementById('ghUploadBtn').disabled = false;
    updateHeaderSub();
    render();
  } catch(e) {
    setStatus('err', 'Не удалось загрузить: ' + e.message, '❌');
  }
}

// ═══════════════════════════════════════
//  PARSER
// ═══════════════════════════════════════
function parseStationsText(text) {
  const defM = text.match(/const\s+defaultCoords\s*=\s*({[\s\S]*?});/);
  const stM  = text.match(/this\.stations\s*=\s*({[\s\S]*?});/);
  const tmM  = text.match(/this\.travelTimes\s*=\s*({[\s\S]*?});/);
  showMsg(`🔍 def:${!!defM} st:${!!stM} tm:${!!tmM}`, 5000);

  function extractBraces(str, keyword) {
    const ki = str.indexOf(keyword);
    if (ki === -1) return null;
    const start = str.indexOf('{', ki);
    if (start === -1) return null;
    let depth = 0;
    for (let i = start; i < str.length; i++) {
      if (str[i] === '{') depth++;
      else if (str[i] === '}') { if (--depth === 0) return str.slice(start, i + 1); }
    }
    return null;
  }

  const ordB = extractBraces(text, 'this.participantOrders');
  const ordM = ordB ? [null, ordB] : null;
  const trfM = text.match(/this\.treffpunkt\s*=\s*({[\s\S]*?});/);
  const trtM = text.match(/this\.trefftravelTimes\s*=\s*({[\s\S]*?});/);
  if (!defM && !stM) throw new Error('Не найдены блоки данных');
  if (defM) data.defaultCoords = Function('"use strict";return (' + defM[1] + ')')();
  if (stM)  data.stations      = Function('"use strict";return (' + stM[1]  + ')')();
  // Приветствия
  const grM2 = text.match(/const\s+defaultGreetingsData\s*=\s*(\[[\s\S]*?\]);/);
  if (grM2) defaultGreetings = Function('"use strict";return (' + grM2[1] + ')')();
  // Конечные точки
  const destM2 = text.match(/const\s+defaultMachineDestinationsData\s*=\s*(\[[\s\S]*?\]);/);
  if (destM2) defaultMachineDestinations = Function('"use strict";return (' + destM2[1] + ')')();
  // Прощание из stations.js
  const farewellM2 = text.match(/const\s+defaultFarewellData\s*=\s*({[\s\S]*?});/);
  if (farewellM2) { const fd = Function('"use strict";return (' + farewellM2[1] + ')')(); farewellText = fd.text || 'Tschüss 👋'; if (fd.list) farewellList = [...fd.list]; }
  // Попутчики стартовой точки
  const spM = text.match(/const\s+defaultStartPassengersData\s*=\s*({[\s\S]*?});/);
  if (spM) startPassengers = Function('"use strict";return (' + spM[1] + ')')();
  if (tmM)  travelTimes        = Function('"use strict";return (' + tmM[1]  + ')')();
  if (ordM) {
    const raw = Function('"use strict";return (' + ordM[1] + ')')();
    // Новый формат: значение может быть {startPassengers:[...], order:[...]}
    Object.keys(raw).forEach(driver => {
      const val = raw[driver];
      if (val && !Array.isArray(val) && val.order) {
        participantOrders[driver] = val.order;
        if (val.startPassengers && val.startPassengers.length) {
          startPassengers[driver] = val.startPassengers;
        }
      } else {
        participantOrders[driver] = val;
      }
    });
  }
  if (trfM) treffpunkt         = Function('"use strict";return (' + trfM[1] + ')')();
  if (trtM) trefftravelTimes   = Function('"use strict";return (' + trtM[1] + ')')();
  // Поддержка старого формата defaultStartPassengersData
  if (spM && Object.keys(startPassengers).length === 0) startPassengers = Function('"use strict";return (' + spM[1] + ')')();
}

// ═══════════════════════════════════════
//  TRAVEL LINK UTILS
// ═══════════════════════════════════════
function addTravelLinks(newName) {
  Object.keys(data.defaultCoords).forEach(old => {
    if (old === newName) return;
    if (travelTimes[`${newName}-${old}`] === undefined) travelTimes[`${newName}-${old}`] = DEFAULT_TT;
  });
}
function removeTravelLinks(name) {
  Object.keys(travelTimes).forEach(k => {
    if (k.startsWith(name + '-') || k.endsWith('-' + name)) delete travelTimes[k];
  });
}
function getAllUsedNames(driver) {
  const used = new Set();
  (participantOrders[driver] || []).forEach(item => {
    if (typeof item === 'string') used.add(item);
    else if (item?.main) { used.add(item.main); item.subParticipants?.forEach(s => used.add(s)); }
  });
  return used;
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render() {
  const box = document.getElementById('cards');
  box.innerHTML = '';
  const grp = currentGroup;

  // ── participantOrders ──────────────────
  if (grp === 'participantOrders') {
    const drivers = Object.keys(data.defaultCoords).sort();

    const row = document.createElement('div');
    row.className = 'driver-row';
    row.innerHTML = `<label>Водитель</label>`;
    const driverSel = document.createElement('select');
    driverSel.id = 'driverSel';
    drivers.forEach(d => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = d;
      if (d === (participantOrders._lastDriver || drivers[0])) opt.selected = true;
      driverSel.appendChild(opt);
    });
    row.appendChild(driverSel);

    const addBtn2 = document.createElement('button');
    addBtn2.className = 'add-sub-btn';
    addBtn2.textContent = '+';
    addBtn2.title = 'Добавить участника';
    addBtn2.style.cssText = 'width:34px;height:34px;border-radius:var(--r-sm);flex-shrink:0;';
    addBtn2.onclick = () => triggerAddOrder(driverSel.value);
    row.appendChild(addBtn2);
    box.appendChild(row);

    // ── Попутчики стартовой точки водителя ──
    const passRow = document.createElement('div');
    passRow.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:8px 0 12px;padding:8px 10px;background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border);';

    function rebuildPassengers() {
      const driver = driverSel.value;
      passRow.innerHTML = '';
      const lbl = document.createElement('span');
      lbl.textContent = '🚗 Со старта:';
      lbl.style.cssText = 'font-size:0.85em;color:var(--text2);flex-shrink:0;';
      passRow.appendChild(lbl);

      const plist = startPassengers[driver] || [];
      plist.forEach((name, pi) => {
        const chip = document.createElement('span');
        chip.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:var(--accent-lt);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:0.85em;';
        chip.innerHTML = `${name} <button style="background:none;border:none;cursor:pointer;color:inherit;font-size:1em;padding:0;line-height:1;" title="Удалить">×</button>`;
        chip.querySelector('button').onclick = () => {
          startPassengers[driver].splice(pi, 1);
          if (!startPassengers[driver].length) delete startPassengers[driver];
          rebuildPassengers(); updateRaw();
        };
        passRow.appendChild(chip);
      });

      const addPassBtn = document.createElement('button');
      addPassBtn.style.cssText = 'width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1.1em;line-height:1;flex-shrink:0;';
      addPassBtn.textContent = '+';
      addPassBtn.title = 'Добавить попутчика со старта';
      addPassBtn.onclick = () => {
        const driver = driverSel.value;
        const allNames = Object.keys(data.defaultCoords).filter(n => n !== driver);
        const current = startPassengers[driver] || [];
        const avail = allNames.filter(n => !current.includes(n));
        if (!avail.length) { showMsg('Все уже добавлены'); return; }
        bsOpen({
          title: `Попутчик ${driver} со старта`,
          items: avail,
          mode: 'participant',
          onSelect(name) {
            if (!startPassengers[driver]) startPassengers[driver] = [];
            if (!startPassengers[driver].includes(name)) startPassengers[driver].push(name);
            rebuildPassengers(); updateRaw(); markDirty(); showMsg('Попутчик добавлен ✓');
          }
        });
      };
      passRow.appendChild(addPassBtn);


    }
    rebuildPassengers();
    box.appendChild(passRow);

    const listBox = document.createElement('div');
    listBox.id = 'orderList';
    box.appendChild(listBox);

    function rebuildList() {
      const driver = driverSel.value;
      participantOrders._lastDriver = driver;
      listBox.innerHTML = '';
      const order = participantOrders[driver] || [];

      if (!order.length) {
        listBox.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><p>Порядок не задан.<br>Нажмите + чтобы добавить.</p></div>`;
        return;
      }

      order.forEach((item, idx) => {
        if (typeof item === 'string') {
          const div = mkCard(false, idx);
          const nm = document.createElement('span'); nm.className = 'card-name'; nm.style.cursor = 'default';
          nm.textContent = `${idx + 1}. ${item}`; div.appendChild(nm);
          const subBtn = mkAddSubBtn();
          subBtn.onclick = e => { e.stopPropagation(); triggerConvertToGroup(driver, idx, item); };
          div.appendChild(subBtn);
          div.appendChild(mkHandle());
          div.appendChild(mkDelBtn(() => { order.splice(idx, 1); rebuildList(); showMsg('Удалено'); }));
          listBox.appendChild(div);
        } else if (item?.treffpunkt) {
          // Место встречи
          const div = mkCard(false, idx);
          div.style.borderLeft = '3px solid #ff9800';
          const nm = document.createElement('span'); nm.className = 'card-name'; nm.style.cursor = 'default';
          nm.textContent = `${idx + 1}. 📍 ${item.treffpunkt}`; div.appendChild(nm);
          const subBtn = mkAddSubBtn();
          subBtn.title = 'Добавить кто ждёт здесь';
          subBtn.onclick = e => { e.stopPropagation(); triggerAddTreffPerson(driver, idx, item.treffpunkt); };
          div.appendChild(subBtn);
          div.appendChild(mkHandle());
          div.appendChild(mkDelBtn(() => { order.splice(idx, 1); rebuildList(); showMsg('Удалено'); }));
          listBox.appendChild(div);
          // Коллеги которые ждут у этого Treffpunkt
          if (item.persons?.length) {
            const indent = document.createElement('div'); indent.className = 'group-indent';
            item.persons.forEach((person, pi) => {
              const sd = mkCard(false, idx);
              sd.classList.add('sub-card');
              const arrow = document.createElement('span'); arrow.textContent = '↳'; arrow.style.cssText = 'color:var(--text2);font-size:.8rem;flex-shrink:0;';
              const nm2 = document.createElement('span'); nm2.className = 'card-name'; nm2.style.cursor = 'default'; nm2.textContent = person;
              sd.appendChild(arrow); sd.appendChild(nm2);
              sd.appendChild(mkDelBtn(() => { item.persons.splice(pi, 1); rebuildList(); showMsg('Удалено'); }));
              indent.appendChild(sd);
            });
            listBox.appendChild(indent);
          }
        } else if (item?.main) {
          const div = mkCard(true, idx);
          const nm = document.createElement('span'); nm.className = 'card-name'; nm.style.cursor = 'default';
          nm.textContent = `${idx + 1}. ${item.main} 👥`; div.appendChild(nm);
          const subBtn = mkAddSubBtn();
          subBtn.onclick = e => { e.stopPropagation(); triggerAddToGroup(driver, idx, item.main); };
          div.appendChild(subBtn);
          div.appendChild(mkHandle());
          div.appendChild(mkDelBtn(() => { order.splice(idx, 1); rebuildList(); showMsg('Удалено'); }));
          listBox.appendChild(div);

          if (item.subParticipants?.length) {
            const indent = document.createElement('div'); indent.className = 'group-indent';
            item.subParticipants.forEach((sub, si) => {
              const sd = mkCard(false, idx);
              sd.classList.add('sub-card');
              const arrow = document.createElement('span'); arrow.textContent = '↳'; arrow.style.cssText = 'color:var(--text2);font-size:.8rem;flex-shrink:0;';
              const nm2 = document.createElement('span'); nm2.className = 'card-name'; nm2.style.cursor = 'default'; nm2.textContent = sub;
              sd.appendChild(arrow); sd.appendChild(nm2);
              sd.appendChild(mkDelBtn(() => {
                item.subParticipants.splice(si, 1);
                if (!item.subParticipants.length) order[idx] = item.main;
                rebuildList(); showMsg('Удалено');
              }));
              indent.appendChild(sd);
            });
            listBox.appendChild(indent);
          }
        }
      });

      // Sortable
      if (listBox._sortable) listBox._sortable.destroy();
      listBox._sortable = new Sortable(listBox, {
        animation: 150,
        handle: '.drag-handle',
        filter: '.group-indent',
        onEnd: () => {
          const cards = [...listBox.children].filter(el => el.classList.contains('card'));
          participantOrders[driver] = cards.map(c => order[parseInt(c.dataset.index)]);
          rebuildList(); showMsg('Порядок изменён'); markDirty();
        }
      });

      // Raw JSON
      updateRaw();
    }

    driverSel.onchange = () => { rebuildList(); rebuildPassengers(); };
    rebuildList();

    appendRawBlock(box);
    updateRaw();
    return;
  }

  // ── treffpunkt ──────────────────────────
  if (grp === 'treffpunkt') {
    const entries = Object.entries(treffpunkt);
    if (!entries.length) box.appendChild(emptyState('📍', 'Нет пунктов встречи'));
    entries.forEach(([name, coord]) => {
      const card = document.createElement('div'); card.className = 'card';
      const nm = mkNameEl(name, newName => {
        if (treffpunkt[newName]) { showMsg('Уже существует'); return false; }
        treffpunkt[newName] = treffpunkt[name]; delete treffpunkt[name];
        Object.keys(trefftravelTimes).filter(k => k.startsWith(name + '-')).forEach(k => {
          trefftravelTimes[newName + '-' + k.slice(name.length + 1)] = trefftravelTimes[k];
          delete trefftravelTimes[k];
        });
        render(); markDirty(); showMsg('Переименовано'); return true;
      });
      card.appendChild(nm);
      card.appendChild(mkCoordInput(coord, c => { treffpunkt[name] = c; }));
      card.appendChild(mkDelBtn(() => {
        Object.keys(trefftravelTimes).forEach(k => { if (k.startsWith(name + '-')) delete trefftravelTimes[k]; });
        delete treffpunkt[name]; render(); showMsg('Удалено');
      }));
      box.appendChild(card);
    });
    appendRawBlock(box);
    document.getElementById('rawJson').value = JSON.stringify(treffpunkt, null, 2);
    return;
  }

  // ── trefftravelTimes / travelTimes ──────
  if (grp === 'trefftravelTimes' || grp === 'travelTimes') {
    const src = grp === 'travelTimes' ? travelTimes : trefftravelTimes;
    const entries = Object.entries(src);
    if (!entries.length) box.appendChild(emptyState('⏱', 'Нет записей о времени'));
    entries.forEach(([key, val]) => {
      const card = document.createElement('div'); card.className = 'card';
      const nm = document.createElement('span'); nm.className = 'card-name'; nm.style.cursor = 'default';
      nm.style.fontSize = '.82rem'; nm.textContent = key;
      card.appendChild(nm);

      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:auto;';

      const ti = document.createElement('input');
      ti.type = 'text';
      ti.className = 'card-time-input';

      const unitLabel = document.createElement('span');
      unitLabel.className = 'time-min';

      // Минуты → отображение: любое >= 60 → часы, < 60 → минуты
      function toDisplay(minutes) {
        if (minutes >= 60) {
          return { text: (minutes / 60).toFixed(2), unit: 'ч' };
        }
        return { text: String(minutes), unit: 'мин' };
      }

      // Ввод пользователя → минуты:
      // "20"   → 20 мин  (целое < 60 → минуты)
      // "120"  → 120 мин = 2 ч  (целое >= 60 → минуты, отобразится как "2.0 ч")
      // "2.0" или "2,0" → 2 * 60 = 120 мин  (есть точка/запятая → часы)
      function fromInput(raw) {
        const s = raw.trim().replace(',', '.');
        const n = parseFloat(s);
        if (isNaN(n) || n <= 0) return null;
        return s.includes('.') ? Math.round(n * 60) : Math.round(n);
      }

      const { text, unit } = toDisplay(val);
      ti.value = text;
      unitLabel.textContent = unit;

      ti.addEventListener('change', () => {
        const minutes = fromInput(ti.value);
        if (minutes && minutes > 0) {
          src[key] = minutes;
          const { text: t, unit: u } = toDisplay(minutes);
          ti.value = t;
          unitLabel.textContent = u;
          showMsg('Сохранено');
        } else {
          const { text: t, unit: u } = toDisplay(src[key]);
          ti.value = t; unitLabel.textContent = u;
          showMsg('Неверный формат');
        }
      });

      wrap.appendChild(ti);
      wrap.appendChild(unitLabel);

      // Кнопка Google Maps — показывает статус расчёта
      const isTreff = grp === 'trefftravelTimes';
      const recBtn = document.createElement('button');
      recBtn.className = 'google-map-btn';
      recBtn.title = 'Рассчитать время через Google Maps';
      recBtn.innerHTML = getAutoFlag(key, isTreff) ? coloredMapSvg : grayMapSvg;
      recBtn.onclick = e => {
        e.stopPropagation();
        isTreff ? recalcOneTreff(key, recBtn) : recalcOne(key, src, recBtn);
      };
      wrap.appendChild(recBtn);

      // Сбрасываем флаг при ручном изменении
      ti.addEventListener('change', () => {
        setAutoFlag(key, isTreff, false);
        recBtn.innerHTML = grayMapSvg;
      });

      card.appendChild(wrap);
      card.appendChild(mkDelBtn(() => { delete src[key]; render(); showMsg('Удалено'); }));
      box.appendChild(card);
    });
    appendRawBlock(box);
    document.getElementById('rawJson').value = JSON.stringify(src, null, 2);
    return;
  }

  // ── defaultCoords / stations ─────────────
  const src = data[grp] || {};
  const entries = Object.entries(src);
  if (!entries.length) box.appendChild(emptyState(grp === 'stations' ? '🚉' : '👤', 'Список пуст'));
  entries.forEach(([name, coord]) => {
    const card = document.createElement('div'); card.className = 'card';
    const nm = mkNameEl(name, newName => {
      if (data[grp][newName]) { showMsg('Уже существует'); return false; }
      data[grp][newName] = data[grp][name]; delete data[grp][name];
      if (grp === 'defaultCoords') { removeTravelLinks(name); addTravelLinks(newName); }
      render(); markDirty(); showMsg('Переименовано'); return true;
    });
    card.appendChild(nm);
    card.appendChild(mkCoordInput(coord, c => { data[grp][name] = c; }));
    card.appendChild(mkDelBtn(() => {
      if (grp === 'defaultCoords') removeTravelLinks(name);
      delete data[grp][name];
      Object.keys(participantOrders).forEach(s => {
        if (!s.startsWith('_')) participantOrders[s] = participantOrders[s].filter(n => n !== name);
      });
      render(); showMsg('Удалено'); updateHeaderSub();
    }));
    box.appendChild(card);
  });

  // ── greetings ──────────────────────────────
  if (grp === 'greetings') {
    if (!defaultGreetings.length) box.appendChild(emptyState('💬', 'Список приветствий пуст'));
    defaultGreetings.forEach((greeting, idx) => {
      const card = document.createElement('div'); card.className = 'card';
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = greeting; inp.className = 'name-input';
      inp.style.cssText = 'flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.95em;';
      inp.addEventListener('change', () => { defaultGreetings[idx] = inp.value.trim(); });
      card.appendChild(inp);
      card.appendChild(mkDelBtn(() => { defaultGreetings.splice(idx, 1); render(); showMsg('Удалено'); }));
      box.appendChild(card);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'tbtn'; addBtn.textContent = '+ Добавить приветствие';
    addBtn.style.cssText = 'margin-top:8px;width:100%;';
    addBtn.onclick = () => { defaultGreetings.push('Новое приветствие'); render(); markDirty(); showMsg('Добавлено ✓'); };
    box.appendChild(addBtn);
    return;
  }

  // ── destinations ───────────────────────────
  if (grp === 'destinations') {
    if (!defaultMachineDestinations.length) box.appendChild(emptyState('🏁', 'Список конечных точек пуст'));
    defaultMachineDestinations.forEach((dest, idx) => {
      const card = document.createElement('div'); card.className = 'card';
      const nameInp = document.createElement('input');
      nameInp.type = 'text'; nameInp.value = dest.name; nameInp.className = 'name-input';
      nameInp.style.cssText = 'flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.95em;min-width:120px;';
      nameInp.addEventListener('change', () => { defaultMachineDestinations[idx].name = nameInp.value.trim(); });
      card.appendChild(nameInp);
      card.appendChild(mkCoordInput(dest, c => { defaultMachineDestinations[idx].lat = c.lat; defaultMachineDestinations[idx].lng = c.lng; }));
      card.appendChild(mkDelBtn(() => { defaultMachineDestinations.splice(idx, 1); render(); showMsg('Удалено'); }));
      box.appendChild(card);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'tbtn'; addBtn.textContent = '+ Добавить точку';
    addBtn.style.cssText = 'margin-top:8px;width:100%;';
    addBtn.onclick = () => { defaultMachineDestinations.push({ name: 'Новая точка', lat: null, lng: null }); render(); markDirty(); showMsg('Добавлено ✓'); };
    box.appendChild(addBtn);
    return;
  }

  // ── farewell ────────────────────────────────────────────────────────────
  if (grp === 'farewell') {
    if (!farewellList.length) box.appendChild(emptyState('👋', 'Список пуст'));
    farewellList.forEach((item, idx) => {
      const card = document.createElement('div'); card.className = 'card';
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = item; inp.className = 'name-input';
      inp.style.cssText = 'flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.95em;';
      inp.addEventListener('change', () => {
        farewellList[idx] = inp.value.trim();
        if (idx === 0) farewellText = farewellList[0];
      });
      card.appendChild(inp);
      // Пометить первый как "по умолчанию"
      if (idx === 0) {
        const badge = document.createElement('span');
        badge.textContent = 'default';
        badge.style.cssText = 'font-size:0.7em;color:var(--accent);flex-shrink:0;';
        card.appendChild(badge);
      }
      card.appendChild(mkDelBtn(() => { farewellList.splice(idx, 1); render(); showMsg('Удалено'); }));
      box.appendChild(card);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'tbtn'; addBtn.textContent = '+ Добавить прощание';
    addBtn.style.cssText = 'margin-top:8px;width:100%;';
    addBtn.onclick = () => { farewellList.push('Tschüss 👋'); render(); markDirty(); showMsg('Добавлено ✓'); };
    box.appendChild(addBtn);
    return;
  }


  // Count badge
  const cnt = document.createElement('div');
  cnt.style.cssText = 'display:flex;justify-content:flex-end;margin-bottom:4px;';
  cnt.innerHTML = `<span class="section-count">${entries.length} записей</span>`;
  if (entries.length) box.insertBefore(cnt, box.firstChild);

  appendRawBlock(box);
  document.getElementById('rawJson').value = JSON.stringify(src, null, 2);
}

// ═══════════════════════════════════════
//  RAW JSON HELPERS
// ═══════════════════════════════════════
let _rawWasOpen = false;
function appendRawBlock(box) {
  const rb = document.createElement('div'); rb.className = 'raw-block';
  rb.innerHTML = `
    <button class="raw-toggle" id="rawToggle">
      <span>{ } JSON</span>
      <span class="raw-toggle-arrow">▼</span>
    </button>
    <div class="raw-body" id="rawBody">
      <textarea id="rawJson" spellcheck="false"></textarea>
    </div>`;
  box.appendChild(rb);

  const btn = rb.querySelector('#rawToggle');
  const body = rb.querySelector('#rawBody');
  // Восстановить состояние после render()
  if (_rawWasOpen) { body.classList.add('open'); btn.classList.add('open'); }
  btn.addEventListener('click', () => {
    const open = body.classList.toggle('open');
    btn.classList.toggle('open', open);
    _rawWasOpen = open;
  });
}
function updateRaw() {
  const grp = currentGroup;
  const el = document.getElementById('rawJson');
  if (!el) return;
  if (grp === 'participantOrders') {
    const combined = {};
    Object.keys(participantOrders).filter(k => !k.startsWith('_')).forEach(k => {
      const sp = startPassengers[k];
      if (sp && sp.length) {
        combined[k] = { startPassengers: sp, order: participantOrders[k] };
      } else {
        combined[k] = participantOrders[k];
      }
    });
    el.value = JSON.stringify(combined, null, 2);
  } else if (grp === 'travelTimes') el.value = JSON.stringify(travelTimes, null, 2);
  else if (grp === 'trefftravelTimes') el.value = JSON.stringify(trefftravelTimes, null, 2);
  else if (grp === 'treffpunkt') el.value = JSON.stringify(treffpunkt, null, 2);
  else if (grp === 'greetings') el.value = JSON.stringify(defaultGreetings, null, 2);
  else if (grp === 'destinations') el.value = JSON.stringify(defaultMachineDestinations, null, 2);
  else if (grp === 'farewell') el.value = JSON.stringify({ text: farewellList[0] || farewellText, list: farewellList }, null, 2);
  else el.value = JSON.stringify(data[grp] || {}, null, 2);
}

let _bsCallback = null; // { onSelect(name, tab) }

function bsOpen({ title, items = [], treffItems = [], mode = 'participant', onSelect, onAddNew }) {
  // mode: 'participant' | 'treff' | 'both'
  bsClose();

  _bsCallback = { onSelect, onAddNew, mode };

  const overlay = document.createElement('div');
  overlay.id = 'bsOverlay';
  overlay.className = 'bs-overlay show';
  overlay.addEventListener('click', e => { if (e.target === overlay) bsClose(); });

  const sheet = document.createElement('div');
  sheet.className = 'bs-sheet';

  // Ручка
  const handle = document.createElement('div');
  handle.className = 'bs-handle';

  // Шапка
  const header = document.createElement('div');
  header.className = 'bs-header';
  const titleEl = document.createElement('div');
  titleEl.className = 'bs-title';
  titleEl.textContent = title;
  header.appendChild(titleEl);

  // Вкладки (только если mode=both)
  if (mode === 'both') {
    const tabs = document.createElement('div');
    tabs.className = 'bs-tabs';
    ['participant', 'treff'].forEach(tab => {
      const btn = document.createElement('button');
      btn.className = 'bs-tab' + (tab === 'participant' ? ' active' : '');
      btn.dataset.tab = tab;
      btn.textContent = tab === 'participant' ? '👤 Коллега' : '📍 Treffpunkt';
      btn.onclick = () => bsSwitchTab(tab, items, treffItems, onSelect);
      tabs.appendChild(btn);
    });
    header.appendChild(tabs);
  }

  const divider = document.createElement('div');
  divider.className = 'bs-divider';

  const listLabel = document.createElement('div');
  listLabel.className = 'bs-list-label';
  listLabel.id = 'bsListLabel';
  listLabel.textContent = mode === 'treff' ? 'ВЫБЕРИТЕ МЕСТО ВСТРЕЧИ' : 'ВЫБЕРИТЕ УЧАСТНИКА';

  const list = document.createElement('div');
  list.className = 'bs-list';
  list.id = 'bsList';

  const footer = document.createElement('div');
  footer.className = 'bs-footer';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'bs-btn-cancel';
  cancelBtn.textContent = 'Отмена';
  cancelBtn.onclick = bsClose;
  footer.appendChild(cancelBtn);

  sheet.appendChild(handle);
  sheet.appendChild(header);
  sheet.appendChild(divider);
  sheet.appendChild(listLabel);
  sheet.appendChild(list);
  sheet.appendChild(footer);
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);

  // Рендерим нужный список
  const initTab = mode === 'treff' ? 'treff' : 'participant';
  bsRenderList(initTab, items, treffItems, onSelect, onAddNew);
}

function bsSwitchTab(tab, items, treffItems, onSelect) {
  // переключаем кнопки
  document.querySelectorAll('#bsOverlay .bs-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const onAddNew = _bsCallback ? _bsCallback.onAddNew : null;
  bsRenderList(tab, items, treffItems, onSelect, onAddNew);
}

function bsRenderList(tab, items, treffItems, onSelect, onAddNew) {
  const list = document.getElementById('bsList');
  const label = document.getElementById('bsListLabel');
  if (!list) return;
  list.innerHTML = '';

  const isParticipant = tab === 'participant';
  if (label) label.textContent = isParticipant ? 'ВЫБЕРИТЕ УЧАСТНИКА' : 'ВЫБЕРИТЕ МЕСТО ВСТРЕЧИ';

  const names = isParticipant ? items : treffItems;
  names.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'bs-list-item';
    btn.textContent = name;
    btn.onclick = () => { bsClose(); onSelect(name, tab); };
    list.appendChild(btn);
  });

  if (!names.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px 24px;color:var(--text2);font-size:.9em;';
    empty.textContent = isParticipant ? 'Нет доступных участников' : 'Нет доступных мест встречи';
    list.appendChild(empty);
  }

  // Кнопка «+ Neue Person…» / «+ Neuer Treffpunkt…»
  if (onAddNew) {
    const addBtn = document.createElement('button');
    addBtn.className = 'bs-list-item bs-add-new';
    addBtn.textContent = isParticipant ? '＋ Neue Person…' : '＋ Neuer Treffpunkt…';
    addBtn.onclick = () => { bsClose(); onAddNew(tab); };
    list.appendChild(addBtn);
  }
}

function bsClose() {
  const ov = document.getElementById('bsOverlay');
  if (ov) ov.remove();

}

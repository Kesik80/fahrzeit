function getUsedByDriver(driver) {
  const used = new Set();
  used.add(driver);
  (participantOrders[driver] || []).forEach(item => {
    if (typeof item === 'string') used.add(item);
    else if (item?.main) { used.add(item.main); (item.subParticipants || []).forEach(s => used.add(s)); }
    else if (item?.treffpunkt) { (item.persons || []).forEach(s => used.add(s)); }
  });
  return used;
}

function getAllNames() {
  return Object.keys(data.defaultCoords || {}).sort();
}

function triggerAddOrder(driver) {
  const used = getUsedByDriver(driver);
  const avail = getAllNames().filter(n => !used.has(n));
  const treffKeys = Object.keys(treffpunkt);
  const hasTreff = treffKeys.length > 0;
  if (!avail.length && !hasTreff) { showMsg('Все участники уже добавлены'); return; }

  const mode = avail.length && hasTreff ? 'both' : avail.length ? 'participant' : 'treff';

  bsOpen({
    title: `Добавить к ${driver}`,
    items: avail,
    treffItems: treffKeys,
    mode,
    onAddNew(tab) {
      // Открываем addModal с нужным типом
      const sel = document.getElementById('modalGroupSel');
      sel.value = tab === 'treff' ? 'treffpunkt' : 'defaultCoords';
      updateAddPlaceholders();
      openModal('addModal');
    },
    onSelect(name, tab) {
      if (!participantOrders[driver]) participantOrders[driver] = [];
      if (tab === 'treff') {
        participantOrders[driver].push({ treffpunkt: name, persons: [] });
        showMsg('Место встречи добавлено ✓');
      } else {
        participantOrders[driver].push(name);
        showMsg('Добавлено ✓');
      }
      participantOrders._lastDriver = driver;
      render(); markDirty();
    }
  });
}

function triggerConvertToGroup(driver, idx, mainName) {
  const used = getUsedByDriver(driver);
  const avail = getAllNames().filter(n => !used.has(n));
  if (!avail.length) { showMsg('Нет доступных участников'); return; }
  bsOpen({
    title: `Добавить к ${mainName}`,
    items: avail,
    mode: 'participant',
    onSelect(name) {
      participantOrders[driver][idx] = { main: mainName, subParticipants: [name] };
      render(); markDirty(); showMsg('Добавлено ✓');
    }
  });
}

function triggerAddToGroup(driver, groupIdx, groupMain) {
  const used = getUsedByDriver(driver);
  const avail = getAllNames().filter(n => !used.has(n));
  if (!avail.length) { showMsg('Нет доступных участников'); return; }
  bsOpen({
    title: `Добавить в группу ${groupMain}`,
    items: avail,
    mode: 'participant',
    onSelect(name) {
      const g = participantOrders[driver][groupIdx];
      if (g?.subParticipants) g.subParticipants.push(name);
      render(); markDirty(); showMsg('Добавлено ✓');
    }
  });
}

function triggerAddTreffPerson(driver, treffIdx, treffName) {
  const used = getUsedByDriver(driver);
  const avail = getAllNames().filter(n => !used.has(n));
  if (!avail.length) { showMsg('Нет доступных участников'); return; }
  bsOpen({
    title: `Кто ждёт у ${treffName}`,
    items: avail,
    mode: 'participant',
    onSelect(name) {
      const t = participantOrders[driver][treffIdx];
      if (t?.persons) t.persons.push(name);
      else if (t) t.persons = [name];
      render(); markDirty(); showMsg('Добавлено ✓');
    }
  });
}

function openRecalcModal() {
  document.getElementById('recalcProgress').style.display = 'none';
  document.getElementById('recalcProgress').textContent = '';
  document.getElementById('recalcStart').disabled = false;
  openModal('recalcModal');
}

document.getElementById('recalcBtn').onclick = openRecalcModal;

document.getElementById('recalcStart').onclick = async () => {
  const target = document.getElementById('recalcTarget').value;
  const mode   = document.getElementById('recalcMode').value;
  const prog   = document.getElementById('recalcProgress');
  prog.style.display = 'block';

  // Собираем пары
  const pairs = [];
  if (target === 'travelTimes' || target === 'both') {
    Object.keys(travelTimes).forEach(key => {
      if (mode === 'missing' && travelTimes[key] !== DEFAULT_TT) return;
      pairs.push({ key, src: travelTimes, isTreff: false });
    });
  }
  if (target === 'trefftravelTimes' || target === 'both') {
    Object.keys(trefftravelTimes).forEach(key => {
      if (mode === 'missing' && trefftravelTimes[key] !== DEFAULT_TT) return;
      pairs.push({ key, src: trefftravelTimes, isTreff: true });
    });
  }

  if (!pairs.length) { prog.textContent = 'ℹ️ Нет пар для пересчёта'; return; }

  const startBtn = document.getElementById('recalcStart');
  startBtn.disabled = true;
  let done = 0, errors = 0;

  for (const { key, src, isTreff } of pairs) {
    prog.textContent = `⏳ ${done + errors + 1} / ${pairs.length}  —  ${key}`;
    try {
      const [a, b] = splitPairKey(key, isTreff);
      const cA = isTreff ? treffpunkt[a] : getCoordsFor(a);
      const cB = getCoordsFor(b);
      if (!cA || !cB) throw new Error(`нет координат: ${!cA ? a : b}`);
      src[key] = await fetchTravelTime(cA.lat, cA.lng, cB.lat, cB.lng);
      setAutoFlag(key, isTreff, true);
      done++;
    } catch(e) {
      errors++;
      console.warn(`${key}: ${e.message}`);
    }
    await new Promise(r => setTimeout(r, 300));
  }

  prog.textContent = `✅ Готово: обновлено ${done}, ошибок ${errors}`;
  startBtn.disabled = false;
  render();
  showMsg(`Пересчитано ${done} пар`, 3000);
};

function buildExportText() {
  const L = (o, fn) => Object.entries(o).map(fn).join(',\n');
  return `// реестр имен
const defaultCoords = {
${L(data.defaultCoords, ([n,c]) => `  '${n}': {lat: ${c.lat}, lng: ${c.lng}}`)}
};

// реестр станций
this.stations = {
${L(data.stations, ([n,c]) => `  '${n}': {lat: ${c.lat}, lng: ${c.lng}}`)}
};

// Время в пути между участниками
this.travelTimes = {
${L(travelTimes, ([p,t]) => `  '${p}': ${t}`)}
};

// Пункты встречи (Treffpunkt)
this.treffpunkt = {
${L(treffpunkt, ([n,c]) => `  '${n}': {lat: ${c.lat}, lng: ${c.lng}}`)}
};

// Время в пути от пункта встречи до каждого участника
this.trefftravelTimes = {
${L(trefftravelTimes, ([p,t]) => `  '${p}': ${t}`)}
};

// Приоритетные списки остановок и попутчики
this.participantOrders = {
${Object.keys(participantOrders).filter(k => !k.startsWith('_')).map(s => {
  const arr = (participantOrders[s] || []).map(item => {
    if (typeof item === 'string') return `"${item}"`;
    if (item?.treffpunkt) return `{"treffpunkt":"${item.treffpunkt}","persons":${JSON.stringify(item.persons || [])}}`;
    return `{"main":"${item.main}","subParticipants":${JSON.stringify(item.subParticipants || [])}}`;
  });
  const sp = startPassengers[s];
  if (sp && sp.length) {
    return `  '${s}': {"startPassengers":[${sp.map(p=>`"${p}"`).join(',')}],"order":[${arr.join(',')}]}`;
  }
  return `  '${s}': [${arr.join(',')}]`;
}).join(',\n')}
};

  if (!fi.files.length) { showMsg('Выберите файл'); return; }
  const file = fi.files[0];
  const path = ni.value.trim() || file.name;
  await uploadToGitHub(token, path, await file.text());
};

async function uploadToGitHub(token, path, text) {
  localStorage.ghToken = token;
  showMsg('Загрузка на GitHub…', 5000);
  const base64 = btoa(unescape(encodeURIComponent(text)));
  let sha;
  try {
    const h = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (h.ok) sha = (await h.json()).sha;
  } catch {}
  const resp = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `web-update ${path}`, content: base64, sha })
  });
  closeModal('ghModal');
  if (resp.ok) {
    setStatus('ok', `✅ ${path} загружен на GitHub`, '✅');
    showMsg(`${path} загружен ✅`, 2500);
  } else {
    const err = await resp.json();
    showMsg('Ошибка: ' + err.message, 4000);
  }
}

// ═══════════════════════════════════════
//  COORDS PARSER
// ═══════════════════════════════════════
// ── Координаты: один вызов к /api/parse-coords ───────────────────────────────
// Принимает любой формат: координаты, длинные и короткие ссылки Google
async function parseAnyCoords(input) {
  if (!input) return null;
  input = input.trim();
  try {
    showMsg('🔄 Определяю координаты…', 5000);
    const resp = await fetch('/api/parse-coords?input=' + encodeURIComponent(input));
    const d = await resp.json();
    if (d.success) return { lat: d.lat, lng: d.lng };
    showMsg('❌ ' + (d.error || 'Координаты не распознаны'), 3000);
    return null;
  } catch (e) {
    showMsg('❌ Ошибка: ' + e.message, 3000);
    return null;
  }
}

loadFromGitHub();

// ═══════════════════════════════════════
//  DIRTY INDICATOR (несохранённые изменения)
// ═══════════════════════════════════════
let isDirty = false;

function markDirty() {
  isDirty = true;
  document.getElementById('dirtyBadge').classList.add('visible');
}
function markClean() {
  isDirty = false;
  document.getElementById('dirtyBadge').classList.remove('visible');
}

// Снимаем при сохранении
document.getElementById('saveBtn').addEventListener('click', () => {
  setTimeout(markClean, 100);
}, true);

// Предупреждение при закрытии страницы если есть несохранённые изменения
window.addEventListener('beforeunload', e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// ═══════════════════════════════════════
//  ПОИСК ПО ЗАПИСЯМ
// ═══════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchClear.classList.toggle('visible', q.length > 0);
  filterCards(q);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  filterCards('');
  searchInput.focus();
});

function filterCards(q) {
  document.querySelectorAll('#cards .card').forEach(card => {
    card.style.display = (!q || card.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

// Сброс поиска при смене таба
document.getElementById('tabs').addEventListener('click', () => {
  if (searchInput.value) {
    searchInput.value = '';
    searchClear.classList.remove('visible');
  }
});

// Помечаем «изменено» при вводе в поля карточек
document.getElementById('cards').addEventListener('input', markDirty);
document.getElementById('cards').addEventListener('change', markDirty);
</script>
